<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <title>开发板状态</title>
  </head>
  <body>
    <h1>我的开发板状态页面</h1>
    <pre id="status">加载中...</pre>

    <script>
      function loadStatus() {
        fetch('/status.json', { cache: 'no-store' })
          .then(r => r.json())
          .then(d => {
            document.querySelector('#status').textContent =
              JSON.stringify(d, null, 2)
          })
          .catch(() => {
            document.querySelector('#status').textContent = '读取 status.json 失败'
          })
      }

      loadStatus()
      setInterval(loadStatus, 10000)
    </script>
  </body>
</html>
