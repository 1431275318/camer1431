<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#101820">
    <title>开发板状态</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f7fb;
        --panel: #ffffff;
        --panel-soft: #eef5f6;
        --ink: #101820;
        --muted: #667085;
        --line: #dbe4ec;
        --teal: #008b8b;
        --green: #1f9d68;
        --amber: #b7791f;
        --red: #c2413b;
        --blue: #2563eb;
        --shadow: 0 18px 50px rgba(16, 24, 32, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          linear-gradient(180deg, rgba(0, 139, 139, 0.10), rgba(244, 247, 251, 0) 320px),
          var(--bg);
        color: var(--ink);
      }

      .app {
        width: min(960px, 100%);
        margin: 0 auto;
        padding: 18px 14px 28px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 14px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }

      .mark {
        width: 38px;
        height: 38px;
        border-radius: 8px;
        display: grid;
        place-items: center;
        color: #ffffff;
        background: linear-gradient(135deg, #008b8b, #2563eb);
        box-shadow: 0 10px 24px rgba(0, 139, 139, 0.22);
        flex: 0 0 auto;
      }

      .mark svg {
        width: 22px;
        height: 22px;
      }

      h1 {
        margin: 0;
        font-size: 18px;
        line-height: 1.2;
        letter-spacing: 0;
      }

      .subtitle {
        margin: 2px 0 0;
        color: var(--muted);
        font-size: 13px;
        overflow-wrap: anywhere;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        min-height: 32px;
        padding: 7px 10px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.76);
        color: var(--muted);
        font-size: 13px;
        white-space: nowrap;
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--amber);
      }

      .dot.online {
        background: var(--green);
        box-shadow: 0 0 0 5px rgba(31, 157, 104, 0.12);
      }

      .dot.offline {
        background: var(--red);
        box-shadow: 0 0 0 5px rgba(194, 65, 59, 0.12);
      }

      .hero {
        border-radius: 8px;
        background:
          linear-gradient(135deg, rgba(16, 24, 32, 0.94), rgba(20, 80, 82, 0.92)),
          #101820;
        color: #ffffff;
        padding: 20px;
        box-shadow: var(--shadow);
        overflow: hidden;
        position: relative;
      }

      .hero::after {
        content: "";
        position: absolute;
        right: -70px;
        top: -80px;
        width: 210px;
        height: 210px;
        border-radius: 50%;
        border: 36px solid rgba(255, 255, 255, 0.08);
      }

      .hero-content {
        position: relative;
        z-index: 1;
      }

      .hero-label {
        color: rgba(255, 255, 255, 0.68);
        font-size: 13px;
        margin-bottom: 8px;
      }

      .temp-row {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 18px;
      }

      .temperature {
        font-size: clamp(48px, 17vw, 76px);
        line-height: 0.95;
        font-weight: 800;
        letter-spacing: 0;
      }

      .temperature small {
        font-size: 24px;
        font-weight: 700;
        color: rgba(255, 255, 255, 0.72);
      }

      .hero-meta {
        display: grid;
        gap: 6px;
        text-align: right;
        color: rgba(255, 255, 255, 0.78);
        font-size: 13px;
        min-width: 122px;
      }

      .camera {
        margin-top: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        overflow: hidden;
      }

      .camera-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 14px;
        border-bottom: 1px solid var(--line);
      }

      .camera-title {
        margin: 0;
        font-size: 14px;
        font-weight: 750;
      }

      .camera-status {
        color: var(--muted);
        font-size: 13px;
        white-space: nowrap;
      }

      .camera-frame {
        position: relative;
        aspect-ratio: 16 / 9;
        background: #101820;
      }

      .camera-frame img {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: cover;
      }

      .camera-frame img[hidden],
      .camera-empty[hidden] {
        display: none;
      }

      .camera-empty {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 18px;
        color: rgba(255, 255, 255, 0.72);
        text-align: center;
        font-size: 14px;
      }

      .section-title {
        margin: 22px 0 10px;
        font-size: 14px;
        font-weight: 750;
        color: #344054;
      }

      .metrics {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .metric {
        min-height: 132px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        padding: 14px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }

      .metric-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        color: var(--muted);
        font-size: 13px;
      }

      .icon {
        width: 30px;
        height: 30px;
        border-radius: 8px;
        display: grid;
        place-items: center;
        background: var(--panel-soft);
        color: var(--teal);
        flex: 0 0 auto;
      }

      .icon svg {
        width: 17px;
        height: 17px;
      }

      .metric-value {
        margin-top: 16px;
        font-size: 30px;
        line-height: 1;
        font-weight: 800;
        letter-spacing: 0;
        overflow-wrap: anywhere;
      }

      .meter {
        width: 100%;
        height: 7px;
        border-radius: 999px;
        background: #e6edf3;
        overflow: hidden;
        margin-top: 14px;
      }

      .meter span {
        display: block;
        width: 0%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--teal), var(--blue));
        transition: width 240ms ease;
      }

      .details {
        display: grid;
        gap: 8px;
        margin-top: 10px;
      }

      .detail {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        border-bottom: 1px solid var(--line);
        padding: 11px 0;
        color: var(--muted);
        font-size: 14px;
      }

      .detail strong {
        color: var(--ink);
        font-weight: 650;
        text-align: right;
        overflow-wrap: anywhere;
      }

      .footer {
        margin-top: 18px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.6;
        text-align: center;
      }

      @media (min-width: 720px) {
        .app {
          padding: 32px 24px 42px;
        }

        .hero {
          padding: 28px;
        }

        h1 {
          font-size: 22px;
        }

        .metrics {
          grid-template-columns: repeat(4, minmax(0, 1fr));
        }
      }

      @media (prefers-color-scheme: dark) {
        :root {
          color-scheme: dark;
          --bg: #0d1117;
          --panel: #161b22;
          --panel-soft: #1f2a33;
          --ink: #f2f4f7;
          --muted: #9aa6b2;
          --line: #2d3742;
          --shadow: 0 18px 50px rgba(0, 0, 0, 0.34);
        }

        body {
          background:
            linear-gradient(180deg, rgba(0, 139, 139, 0.16), rgba(13, 17, 23, 0) 320px),
            var(--bg);
        }

        .section-title {
          color: #d0d5dd;
        }

        .pill {
          background: rgba(22, 27, 34, 0.72);
        }

        .meter {
          background: #26313c;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div class="brand">
          <div class="mark" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M7 8h10v8H7z" stroke="currentColor" stroke-width="1.8"/>
              <path d="M9 4v4M15 4v4M9 16v4M15 16v4M4 10h3M4 14h3M17 10h3M17 14h3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
          </div>
          <div>
            <h1>开发板状态</h1>
            <p class="subtitle" id="hostname">正在连接设备</p>
          </div>
        </div>
        <div class="pill">
          <span class="dot" id="network-dot"></span>
          <span id="network">检测中</span>
        </div>
      </header>

      <section class="hero">
        <div class="hero-content">
          <div class="hero-label">CPU 温度</div>
          <div class="temp-row">
            <div class="temperature"><span id="cpu-temp">--</span><small>°C</small></div>
            <div class="hero-meta">
              <span id="time">等待数据</span>
              <span id="uptime">运行时间 --</span>
            </div>
          </div>
        </div>
      </section>

      <section class="camera">
        <div class="camera-head">
          <h2 class="camera-title">实时画面</h2>
          <span class="camera-status" id="camera-status">等待图像</span>
        </div>
        <div class="camera-frame">
          <img id="camera-image" alt="开发板摄像头画面" hidden>
          <div class="camera-empty" id="camera-empty">摄像头图片还没有上传</div>
        </div>
      </section>

      <h2 class="section-title">系统指标</h2>
      <section class="metrics" aria-live="polite">
        <article class="metric">
          <div class="metric-head">
            <span>内存占用</span>
            <span class="icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M7 7h10v10H7z" stroke="currentColor" stroke-width="1.8"/>
                <path d="M4 9h3M4 15h3M17 9h3M17 15h3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              </svg>
            </span>
          </div>
          <div>
            <div class="metric-value"><span id="memory">--</span>%</div>
            <div class="meter"><span id="memory-bar"></span></div>
          </div>
        </article>

        <article class="metric">
          <div class="metric-head">
            <span>磁盘占用</span>
            <span class="icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M5 7c0-1.7 3.1-3 7-3s7 1.3 7 3v10c0 1.7-3.1 3-7 3s-7-1.3-7-3z" stroke="currentColor" stroke-width="1.8"/>
                <path d="M5 7c0 1.7 3.1 3 7 3s7-1.3 7-3M5 12c0 1.7 3.1 3 7 3s7-1.3 7-3" stroke="currentColor" stroke-width="1.8"/>
              </svg>
            </span>
          </div>
          <div>
            <div class="metric-value"><span id="disk">--</span>%</div>
            <div class="meter"><span id="disk-bar"></span></div>
          </div>
        </article>

        <article class="metric">
          <div class="metric-head">
            <span>网络地址</span>
            <span class="icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M5 12.5a10 10 0 0 1 14 0M8.5 16a5 5 0 0 1 7 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                <path d="M12 19h.01" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
              </svg>
            </span>
          </div>
          <div class="metric-value" id="ip-address">--</div>
        </article>

        <article class="metric">
          <div class="metric-head">
            <span>刷新频率</span>
            <span class="icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M20 12a8 8 0 1 1-2.3-5.6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                <path d="M20 5v5h-5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
          </div>
          <div class="metric-value">10s</div>
        </article>
      </section>

      <section class="details">
        <div class="detail">
          <span>数据文件</span>
          <strong>/status.json</strong>
        </div>
        <div class="detail">
          <span>最后读取</span>
          <strong id="last-read">--</strong>
        </div>
      </section>

      <p class="footer" id="message">页面会自动刷新，数据由开发板定时上传。</p>
    </main>

    <script>
      const refreshMs = 10000

      const text = (id, value) => {
        document.getElementById(id).textContent = value
      }

      const percent = (value) => {
        const number = Number(value)
        if (!Number.isFinite(number)) return 0
        return Math.max(0, Math.min(100, number))
      }

      const formatNumber = (value) => {
        const number = Number(value)
        if (!Number.isFinite(number)) return '--'
        return number.toFixed(1).replace(/\.0$/, '')
      }

      const formatUptime = (seconds) => {
        const total = Number(seconds)
        if (!Number.isFinite(total)) return '--'

        const days = Math.floor(total / 86400)
        const hours = Math.floor((total % 86400) / 3600)
        const minutes = Math.floor((total % 3600) / 60)

        if (days > 0) return `${days} 天 ${hours} 小时`
        if (hours > 0) return `${hours} 小时 ${minutes} 分钟`
        return `${minutes} 分钟`
      }

      const setBar = (id, value) => {
        document.getElementById(id).style.width = `${percent(value)}%`
      }

      const setNetwork = (status) => {
        const dot = document.getElementById('network-dot')
        dot.classList.remove('online', 'offline')

        if (status === 'online') {
          dot.classList.add('online')
          text('network', '在线')
        } else if (status === 'offline') {
          dot.classList.add('offline')
          text('network', '离线')
        } else {
          text('network', '未知')
        }
      }

      const setCamera = (status) => {
        const image = document.getElementById('camera-image')
        const empty = document.getElementById('camera-empty')
        const cameraStatus = status.camera_status || 'unknown'

        text('camera-status', cameraStatus === 'ok' ? '已更新' : cameraStatus)

        if (cameraStatus === 'ok' && status.camera_image) {
          image.src = `${status.camera_image}?t=${Date.now()}`
          image.hidden = false
          empty.hidden = true
        } else {
          image.hidden = true
          empty.hidden = false
          empty.textContent =
            cameraStatus === 'camera_missing'
              ? '没有检测到摄像头设备'
              : `摄像头状态：${cameraStatus}`
        }
      }

      function render(status) {
        text('hostname', status.hostname || '未知设备')
        text('cpu-temp', formatNumber(status.cpu_temp_c))
        text('memory', formatNumber(status.memory_used_percent))
        text('disk', formatNumber(status.disk_used_percent))
        text('ip-address', status.ip_address || '未获取')
        text('time', status.time || '暂无时间')
        text('uptime', `运行时间 ${formatUptime(status.uptime_seconds)}`)
        text('last-read', new Date().toLocaleTimeString('zh-CN', { hour12: false }))
        text('message', '页面会自动刷新，数据由开发板定时上传。')

        setBar('memory-bar', status.memory_used_percent)
        setBar('disk-bar', status.disk_used_percent)
        setNetwork(status.network)
        setCamera(status)
      }

      function loadStatus() {
        fetch(`/status.json?t=${Date.now()}`, { cache: 'no-store' })
          .then((response) => {
            if (!response.ok) throw new Error('status.json not found')
            return response.json()
          })
          .then(render)
          .catch(() => {
            text('message', '读取 status.json 失败，稍后会自动重试。')
            setNetwork('unknown')
          })
      }

      loadStatus()
      setInterval(loadStatus, refreshMs)
    </script>
  </body>
</html>
